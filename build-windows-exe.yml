name: 打包 Windows exe

# 触发方式：
#   1) 每次把代码推送到 main 分支时自动打包
#   2) 也可以在 GitHub 网页的 Actions 页面手动点击 "Run workflow" 触发
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: {}

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装打包工具
        run: pip install pyinstaller==6.10.0

      - name: 用 PyInstaller 打包成 exe（文件夹模式，方便数据持久保存）
        run: >
          pyinstaller --noconfirm --windowed --name TE-AP-00
          --paths . app.py

      - name: 把厂家数据 / 配置 / 版本记录复制到打包结果旁边
        shell: pwsh
        run: |
          Copy-Item -Recurse -Force "data" "dist/TE-AP-00/data"

      - name: 打包成 zip，方便下载
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/TE-AP-00/*" -DestinationPath "TE-AP-00-windows.zip"

      - name: 上传打包结果（在本次运行页面下方可下载）
        uses: actions/upload-artifact@v4
        with:
          name: TE-AP-00-windows
          path: TE-AP-00-windows.zip
          retention-days: 90
